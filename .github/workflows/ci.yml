name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Check internal links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --offline --base dist 'dist/**/*.html'
          fail: true
